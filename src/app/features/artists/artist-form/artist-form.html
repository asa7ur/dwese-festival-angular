<div class="container mx-auto px-4 flex justify-center items-center min-h-[80vh] mt-8">
  <div class="w-full max-w-lg">
    <div class="bg-rock-800 rounded-lg shadow-2xl border border-gray-700 overflow-hidden">

      <div class="bg-black/40 px-6 py-4 border-b border-gray-700">
        <h4 class="text-lg font-bold text-white uppercase tracking-wide">
          <i class="fa-solid fa-user-astronaut mr-2 text-rock-red"></i>
          <span>{{ isEditMode() ? 'Editar Artista' : 'Nuevo Artista' }}</span>
        </h4>
      </div>

      <div class="p-8">
        <form [formGroup]="artistForm" (ngSubmit)="onSubmit()" class="space-y-6">

          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Nombre de la Banda</label>
            <input type="text" formControlName="name"
                   class="w-full bg-rock-700 text-white border border-gray-600 rounded-md py-2 px-3 focus:outline-none focus:border-rock-red focus:ring-1 focus:ring-rock-red transition">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Género Musical</label>
            <input type="text" formControlName="genre"
                   class="w-full bg-rock-700 text-white border border-gray-600 rounded-md py-2 px-3 focus:outline-none focus:border-rock-red transition">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">País de Origen</label>
            <input type="text" formControlName="country"
                   class="w-full bg-rock-700 text-white border border-gray-600 rounded-md py-2 px-3 focus:outline-none focus:border-rock-red transition">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Imagen</label>
            <input type="file" (change)="onFileSelected($event)" accept="image/*"
                   class="w-full bg-rock-700 text-gray-300 border border-gray-600 rounded-md py-2 px-3 file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-rock-red file:text-white hover:file:bg-rock-darkred cursor-pointer">

            @if (imagePreview()) {
              <div class="mt-4 bg-black/20 p-4 rounded border border-gray-700">
                <div class="text-center">
                  <p class="text-xs text-gray-400 mb-2 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-eye"></i> Imagen actual
                  </p>
                  <img [src]="imagePreview()" alt="Preview"
                       class="w-full h-48 object-cover rounded shadow-lg border border-gray-600 mx-auto">
                </div>
              </div>
            }
          </div>

          <div class="flex flex-col sm:flex-row gap-4 mt-8 pt-4 border-t border-gray-700">
            <button type="submit" [disabled]="artistForm.invalid"
                    class="flex-1 bg-rock-red hover:bg-rock-darkred text-white font-bold py-2 px-4 rounded shadow-lg transition duration-300 disabled:opacity-50">
              Guardar Artista
            </button>
            <a routerLink="/artists"
               class="flex-1 text-center bg-transparent border border-gray-600 hover:border-gray-400 text-gray-300 hover:text-white font-medium py-2 px-4 rounded transition duration-300">
              Cancelar
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
