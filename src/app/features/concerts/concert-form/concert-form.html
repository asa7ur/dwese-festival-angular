<div class="container mx-auto px-4 py-8">
  <div class="max-w-2xl mx-auto">
    <h2 class="text-3xl font-bold text-white mb-8 uppercase border-l-4 border-rock-red pl-4">
      <i class="fa-solid fa-guitar mr-2 text-rock-red"></i>
      {{ isEditMode() ? 'Editar Concierto' : 'Programar Concierto' }}
    </h2>

    @if (errorMessage()) {
      <div class="bg-red-900/50 border border-red-600 text-red-100 px-4 py-3 rounded mb-6">
        <i class="fa-solid fa-triangle-exclamation mr-2"></i>{{ errorMessage() }}
      </div>
    }

    <div class="bg-rock-800 p-8 rounded-lg shadow-xl border border-gray-700">
      <form (ngSubmit)="onSubmit()" #f="ngForm" class="space-y-6">

        <div>
          <label class="block text-gray-400 text-sm font-bold mb-2 uppercase">Artista</label>
          <select name="artistId" required
                  [ngModel]="concert().artistId"
                  (ngModelChange)="updateField('artistId', $event)"
                  #artistId="ngModel"
                  class="w-full bg-rock-700 text-white border border-gray-600 rounded px-4 py-3 focus:border-rock-red outline-none transition"
                  [class.border-red-500]="artistId.invalid && artistId.touched">
            <option [ngValue]="undefined" disabled>Selecciona un artista...</option>
            @for (artist of artists(); track artist.id) {
              <option [value]="artist.id">{{ artist.name }}</option>
            }
          </select>
        </div>

        <div>
          <label class="block text-gray-400 text-sm font-bold mb-2 uppercase">Escenario</label>
          <select name="stageId" required
                  [ngModel]="concert().stageId"
                  (ngModelChange)="updateField('stageId', $event)"
                  #stageId="ngModel"
                  class="w-full bg-rock-700 text-white border border-gray-600 rounded px-4 py-3 focus:border-rock-red outline-none transition"
                  [class.border-red-500]="stageId.invalid && stageId.touched">
            <option [ngValue]="undefined" disabled>Selecciona un escenario...</option>
            @for (stage of stages(); track stage.id) {
              <option [value]="stage.id">{{ stage.name }} (Cap: {{ stage.capacity }})</option>
            }
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-400 text-sm font-bold mb-2 uppercase">Inicio</label>
            <input type="datetime-local" name="startTime" required
                   [ngModel]="concert().startTime"
                   (ngModelChange)="updateField('startTime', $event)"
                   class="w-full bg-rock-700 text-white border border-gray-600 rounded px-4 py-3 focus:border-rock-red outline-none transition">
          </div>
          <div>
            <label class="block text-gray-400 text-sm font-bold mb-2 uppercase">Fin</label>
            <input type="datetime-local" name="endTime" required
                   [ngModel]="concert().endTime"
                   (ngModelChange)="updateField('endTime', $event)"
                   class="w-full bg-rock-700 text-white border border-gray-600 rounded px-4 py-3 focus:border-rock-red outline-none transition">
          </div>
        </div>

        <div class="flex items-center justify-end gap-4 mt-8 pt-6 border-t border-gray-700">
          <a routerLink="/concerts" class="text-gray-400 hover:text-white font-bold py-2 px-4">Cancelar</a>
          <button type="submit" [disabled]="f.invalid"
                  class="bg-rock-red hover:bg-rock-darkred text-white font-bold py-3 px-8 rounded shadow-lg transform hover:scale-105 transition disabled:opacity-50 cursor-pointer">
            <i class="fa-solid fa-calendar-check mr-2"></i>
            {{ isEditMode() ? 'Actualizar' : 'Programar' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
