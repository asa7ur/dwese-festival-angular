<nav class="bg-black border-b-2 border-rock-red mb-8 sticky top-0 z-50 shadow-lg shadow-rock-red/10">
  <div class="container mx-auto px-4">
    <div class="flex flex-wrap justify-between items-center py-4">

      <a routerLink="/"
         class="flex items-center text-rock-red font-bold text-xl uppercase tracking-wider hover:text-white transition duration-300 group">
        <i class="fa-solid fa-hand-horns mr-2 group-hover:rotate-12 transition transform"></i>
        <span>RockFest Manager</span>
      </a>

      <div class="block lg:hidden">
        <button class="text-gray-300 hover:text-white focus:outline-none">
          <i class="fa-solid fa-bars text-2xl"></i>
        </button>
      </div>

      <div class="hidden lg:flex items-center space-x-6">

        <a routerLink="/artists"
           routerLinkActive="text-rock-red"
           class="text-gray-300 hover:text-rock-red font-medium transition duration-300 uppercase text-sm tracking-wide flex items-center gap-2 group">
          <i class="fa-solid fa-guitar text-gray-500 group-hover:text-rock-red transition"></i>
          <span>Artistas</span>
        </a>

        <a routerLink="/stages"
           routerLinkActive="text-rock-red"
           class="text-gray-300 hover:text-rock-red font-medium transition duration-300 uppercase text-sm tracking-wide flex items-center gap-2 group">
          <i class="fa-solid fa-dungeon text-gray-500 group-hover:text-rock-red transition"></i>
          <span>Escenarios</span>
        </a>

        <a routerLink="/concerts"
           routerLinkActive="text-rock-red"
           class="text-gray-300 hover:text-rock-red font-medium transition duration-300 uppercase text-sm tracking-wide flex items-center gap-2 group">
          <i class="fa-solid fa-calendar-days text-gray-500 group-hover:text-rock-red transition"></i>
          <span>Conciertos</span>
        </a>

        <div class="h-6 w-px bg-gray-800 mx-2"></div>

        <a routerLink="/attendees"
           routerLinkActive="text-rock-red"
           class="text-gray-300 hover:text-rock-red font-medium transition duration-300 uppercase text-sm tracking-wide flex items-center gap-2 group">
          <i class="fa-solid fa-users text-gray-500 group-hover:text-rock-red transition"></i>
          <span>Asistentes</span>
        </a>

        <a routerLink="/tickets"
           class="bg-rock-red hover:bg-rock-darkred text-white px-5 py-2 rounded font-bold transition duration-300 uppercase text-sm tracking-wide shadow-[0_0_10px_rgba(220,53,69,0.3)] hover:shadow-[0_0_15px_rgba(220,53,69,0.6)] transform hover:-translate-y-0.5 flex items-center gap-2">
          <i class="fa-solid fa-ticket"></i>
          <span>Entradas</span>
        </a>

        <div class="flex items-center gap-4 ml-4 border-l border-gray-700 pl-4">
          @if (isLoggedIn$ | async) {
            <span class="text-gray-300 text-sm hidden md:inline">
              {{ userName$ | async }}
            </span>
            <button (click)="logout()"
                    class="text-gray-300 hover:text-rock-red transition duration-300"
                    title="Cerrar Sesión">
              <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
          } @else {
            <a routerLink="/login"
               class="text-gray-300 hover:text-rock-red transition duration-300"
               title="Iniciar Sesión">
              <i class="fa-solid fa-user-lock text-lg"></i>
            </a>
          }
        </div>

        <div class="flex items-center gap-2 ml-4 border-l border-gray-700 pl-4">
          <button class="text-xs font-bold transition duration-300 text-rock-red underline decoration-2 underline-offset-4">
            ES
          </button>
          <span class="text-gray-600">|</span>
          <button class="text-xs font-bold transition duration-300 text-gray-500 hover:text-rock-red">
            EN
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
